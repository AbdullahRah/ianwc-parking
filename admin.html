<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>IANWC — Fire Parking Alert</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{--red:#FF1A1A;--amber:#FFA500;--green:#22c55e;--bg:#080808;--panel:#111;--border:#222;--text:#F2F2F2;--muted:#555}
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;min-height:100vh;display:flex;flex-direction:column;align-items:center;padding:32px 20px 60px;gap:24px}
  .page-header{width:100%;max-width:560px;display:flex;align-items:center;justify-content:space-between}
  .logo{font-family:'Bebas Neue',sans-serif;font-size:1.5rem;letter-spacing:2px}
  .logo em{color:var(--red);font-style:normal}
  .tv-link{font-size:.78rem;color:var(--muted);text-decoration:none;border:1px solid var(--border);padding:6px 12px;border-radius:5px;transition:all .2s}
  .tv-link:hover{color:var(--text);border-color:#444}
  .card{width:100%;max-width:560px;background:var(--panel);border:1px solid var(--border);border-radius:14px;overflow:hidden}
  .card-header{padding:24px 26px 18px;border-bottom:1px solid var(--border)}
  .card-header h1{font-family:'Bebas Neue',sans-serif;font-size:2.2rem;letter-spacing:3px;line-height:1.05}
  .card-header h1 em{color:var(--red);font-style:normal}
  .card-header p{margin-top:8px;font-size:.85rem;color:var(--muted);line-height:1.6}
  .card-body{padding:24px 26px;display:flex;flex-direction:column;gap:18px}
  .upload-zone{border:2px dashed var(--border);border-radius:10px;cursor:pointer;transition:all .2s;overflow:hidden;position:relative}
  .upload-zone:hover{background:#141414}
  .upload-zone.car-zone:hover{border-color:var(--red);background:#140000}
  .upload-zone.plate-zone:hover{border-color:var(--amber);background:#141000}
  .upload-zone.car-zone.ready{border-color:var(--red);border-style:solid;background:#120000}
  .upload-zone.plate-zone.ready{border-color:var(--amber);border-style:solid;background:#121000}
  .zone-inner{padding:24px 20px;display:flex;flex-direction:column;align-items:center;gap:6px;text-align:center}
  .zone-preview{width:100%;height:150px;object-fit:cover;display:none}
  .zone-preview.show{display:block}
  .zone-icon{font-size:2rem}.zone-title{font-weight:600;font-size:1rem}.zone-sub{font-size:.78rem;color:var(--muted)}
  .zone-tick{position:absolute;top:10px;right:12px;background:var(--green);color:#fff;font-size:.62rem;font-weight:700;letter-spacing:1px;padding:3px 8px;border-radius:20px;display:none}
  .zone-tick.show{display:block}
  input[type="file"]{display:none}
  #fire-btn{width:100%;padding:20px;background:var(--red);color:#fff;border:none;border-radius:10px;font-family:'Bebas Neue',sans-serif;font-size:1.7rem;letter-spacing:4px;cursor:pointer;transition:opacity .2s,transform .15s;display:flex;align-items:center;justify-content:center;gap:10px}
  #fire-btn:disabled{opacity:.25;cursor:not-allowed;transform:none}
  #fire-btn:not(:disabled):hover{opacity:.88;transform:translateY(-2px)}
  #fire-btn:not(:disabled):active{transform:scale(.98)}
  #status{border-radius:8px;padding:14px 16px;font-size:.88rem;font-weight:500;display:none;align-items:center;gap:10px;line-height:1.5}
  #status.loading{display:flex;background:#0d0d1a;color:#7aabff;border:1px solid #1a1a3a}
  #status.success{display:flex;background:#0d1a0d;color:var(--green);border:1px solid #1a3a1a}
  #status.error{display:flex;background:#1a0d0d;color:#ff7a7a;border:1px solid #3a1a1a}
  .spin{width:15px;height:15px;border:2px solid rgba(122,171,255,.3);border-top-color:#7aabff;border-radius:50%;animation:spin .7s linear infinite;flex-shrink:0}
  @keyframes spin{to{transform:rotate(360deg)}}
  #clear-btn{width:100%;padding:13px;background:transparent;border:1px solid var(--border);border-radius:8px;color:var(--muted);font-family:'DM Sans',sans-serif;font-size:.85rem;cursor:pointer;transition:all .2s;display:none}
  #clear-btn.show{display:block}
  #clear-btn:hover{border-color:#444;color:#888}
  #active-indicator{width:100%;max-width:560px;background:#110000;border:1.5px solid var(--red);border-radius:10px;padding:16px 20px;display:none;align-items:center;justify-content:space-between;gap:14px}
  #active-indicator.show{display:flex}
  .ind-dot{width:12px;height:12px;border-radius:50%;background:var(--red);flex-shrink:0;animation:blink .7s step-start infinite}
  @keyframes blink{50%{opacity:0}}
  .ind-text{font-size:.88rem;color:#ff8888;flex:1}
  .ind-text strong{color:var(--red);display:block;font-size:.95rem}
  #ind-countdown{font-family:'Bebas Neue',sans-serif;font-size:2rem;letter-spacing:2px;color:var(--red);flex-shrink:0}
  .footnote{font-size:.75rem;color:#2a2a2a;text-align:center;max-width:420px;line-height:1.7}
  .prog-wrap{display:none;flex-direction:column;gap:8px}
  .prog-wrap.show{display:flex}
  .prog-label{font-size:.75rem;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:var(--muted)}
  .prog-track{height:5px;background:#1a1a1a;border-radius:3px;overflow:hidden}
  .prog-fill{height:100%;background:var(--amber);border-radius:3px;width:0%;transition:width .3s linear}
</style>
</head>
<body>

<div class="page-header">
  <div class="logo">IANWC <em>//</em> Admin</div>
  <a class="tv-link" href="/display" target="_blank">📺 Open TV Display →</a>
</div>

<div id="active-indicator">
  <div class="ind-dot"></div>
  <div class="ind-text">
    <strong>🚨 Alert Live on TV</strong>
    Auto-clears after 5 minutes
  </div>
  <div id="ind-countdown">5:00</div>
</div>

<div class="card">
  <div class="card-header">
    <h1>🚨 FIRE <em>PARKING</em><br>ALERT</h1>
    <p>Upload photos below. The TV display updates within seconds and auto-clears after 5 minutes.</p>
  </div>
  <div class="card-body">

    <label class="upload-zone car-zone" id="car-zone" for="car-input">
      <img class="zone-preview" id="car-preview" alt="">
      <div class="zone-inner">
        <div class="zone-icon">📷</div>
        <div class="zone-title">Vehicle Photo</div>
        <div class="zone-sub">Tap to take or choose a photo of the car</div>
      </div>
      <div class="zone-tick" id="car-tick">✓ READY</div>
    </label>
    <input type="file" id="car-input" accept="image/*" capture="environment">

    <label class="upload-zone plate-zone" id="plate-zone" for="plate-input">
      <img class="zone-preview" id="plate-preview" alt="">
      <div class="zone-inner">
        <div class="zone-icon">🔍</div>
        <div class="zone-title">License Plate Photo</div>
        <div class="zone-sub">Optional — close-up of the plate</div>
      </div>
      <div class="zone-tick" id="plate-tick">✓ READY</div>
    </label>
    <input type="file" id="plate-input" accept="image/*" capture="environment">

    <div class="prog-wrap" id="prog-wrap">
      <div class="prog-label" id="prog-label">Uploading…</div>
      <div class="prog-track"><div class="prog-fill" id="prog-fill"></div></div>
    </div>

    <div id="status"></div>
    <button id="fire-btn" disabled>🚨 FIRE ALERT ON TV</button>
    <button id="clear-btn">🗑 Cancel Alert &amp; Clear TV Display</button>

  </div>
</div>

<p class="footnote">Photos are stored for 5 minutes then automatically deleted.</p>

<script>
  const DURATION = 5 * 60;
  let carFile = null, plateFile = null, countdownTimer = null;

  // ── FILE ZONES ───────────────────────────────────────────
  function setupZone(inputId, previewId, tickId, zoneId, onReady) {
    document.getElementById(inputId).addEventListener('change', function () {
      const file = this.files[0];
      if (!file) return;
      document.getElementById(previewId).src = URL.createObjectURL(file);
      document.getElementById(previewId).classList.add('show');
      document.getElementById(tickId).classList.add('show');
      document.getElementById(zoneId).classList.add('ready');
      onReady(file);
      document.getElementById('fire-btn').disabled = !carFile;
    });
  }
  setupZone('car-input',   'car-preview',   'car-tick',   'car-zone',   f => carFile   = f);
  setupZone('plate-input', 'plate-preview', 'plate-tick', 'plate-zone', f => plateFile = f);

  function setStatus(type, html) {
    const el = document.getElementById('status');
    el.className = type; el.innerHTML = html;
  }
  function setProgress(pct, label) {
    document.getElementById('prog-label').textContent = label;
    document.getElementById('prog-fill').style.width  = pct + '%';
  }

  // ── COMPRESS ─────────────────────────────────────────────
  function compressImage(file) {
    return new Promise((resolve, reject) => {
      const reader = new FileReader();
      reader.onerror = () => reject(new Error('Could not read file'));
      reader.onload = (e) => {
        const original = e.target.result;
        const img = new Image();
        img.onerror = () => resolve(original);
        img.onload = () => {
          try {
            const MAX = 1280;
            let w = img.width, h = img.height;
            if (w > MAX || h > MAX) {
              if (w > h) { h = Math.round(h * MAX / w); w = MAX; }
              else       { w = Math.round(w * MAX / h); h = MAX; }
            }
            const canvas = document.createElement('canvas');
            canvas.width = w; canvas.height = h;
            canvas.getContext('2d').drawImage(img, 0, 0, w, h);
            const out = canvas.toDataURL('image/jpeg', 0.82);
            resolve(out && out !== 'data:,' ? out : original);
          } catch { resolve(original); }
        };
        img.src = original;
      };
      reader.readAsDataURL(file);
    });
  }

  // ── UPLOAD IMAGE VIA API → IMAGEKIT ──────────────────────
  async function uploadImage(file, fileName) {
    const dataUrl = await compressImage(file);
    const res = await fetch('/api/images', {
      method:  'POST',
      headers: { 'Content-Type': 'application/json' },
      body:    JSON.stringify({ data: dataUrl, fileName }),
    });
    if (!res.ok) {
      const err = await res.json().catch(() => ({}));
      throw new Error(err.error || 'Upload failed');
    }
    return res.json(); // { url, fileId }
  }

  // ── FIRE ALERT ───────────────────────────────────────────
  document.getElementById('fire-btn').addEventListener('click', async () => {
    if (!carFile) return;
    document.getElementById('fire-btn').disabled = true;
    document.getElementById('prog-wrap').classList.add('show');
    setStatus('loading', '<div class="spin"></div><span>Uploading photos…</span>');

    try {
      setProgress(20, 'Uploading car photo…');
      const car = await uploadImage(carFile, 'car.jpg');

      let plateUrl = null, plateFileId = null;
      if (plateFile) {
        setProgress(60, 'Uploading plate photo…');
        const plate = await uploadImage(plateFile, 'plate.jpg');
        plateUrl    = plate.url;
        plateFileId = plate.fileId;
      }

      setProgress(90, 'Firing alert…');
      const res  = await fetch('/api/alert', {
        method:  'POST',
        headers: { 'Content-Type': 'application/json' },
        body:    JSON.stringify({
          carUrl:      car.url,
          carFileId:   car.fileId,
          plateUrl,
          plateFileId,
        }),
      });
      const data = await res.json();
      if (!res.ok) throw new Error(data.error || 'Server error');

      setProgress(100, 'Done');
      document.getElementById('prog-wrap').classList.remove('show');
      setStatus('success', '✅ Alert is live on the TV display! Auto-clears in 5 minutes.');
      document.getElementById('clear-btn').classList.add('show');
      startCountdown(DURATION);

    } catch (err) {
      document.getElementById('prog-wrap').classList.remove('show');
      setStatus('error', `❌ ${err.message}`);
      document.getElementById('fire-btn').disabled = false;
    }
  });

  // ── CLEAR ────────────────────────────────────────────────
  document.getElementById('clear-btn').addEventListener('click', async () => {
    setStatus('loading', '<div class="spin"></div><span>Clearing alert…</span>');
    try {
      await fetch('/api/alert', { method: 'DELETE' });
      setStatus('success', '✅ Alert cleared. TV is back on standby.');
      document.getElementById('clear-btn').classList.remove('show');
      document.getElementById('active-indicator').classList.remove('show');
      clearInterval(countdownTimer);
      document.getElementById('fire-btn').disabled = !carFile;
    } catch (err) {
      setStatus('error', `❌ ${err.message}`);
    }
  });

  // ── COUNTDOWN ────────────────────────────────────────────
  function startCountdown(seconds) {
    clearInterval(countdownTimer);
    document.getElementById('active-indicator').classList.add('show');
    const display = document.getElementById('ind-countdown');
    let s = seconds;
    function tick() {
      const m  = Math.floor(s / 60);
      const ss = (s % 60).toString().padStart(2, '0');
      display.textContent = `${m}:${ss}`;
      if (s <= 0) {
        clearInterval(countdownTimer);
        document.getElementById('active-indicator').classList.remove('show');
        document.getElementById('clear-btn').classList.remove('show');
        document.getElementById('fire-btn').disabled = !carFile;
        setStatus('success', '✅ Alert expired and was automatically cleared.');
      }
      s--;
    }
    tick();
    countdownTimer = setInterval(tick, 1000);
  }

  // ── CHECK ON LOAD ─────────────────────────────────────────
  async function checkExisting() {
    try {
      const res  = await fetch('/api/alert');
      const data = await res.json();
      if (data.active) {
        setStatus('success', `✅ Alert is live. ${Math.floor(data.secondsLeft / 60)}:${String(data.secondsLeft % 60).padStart(2,'0')} remaining.`);
        document.getElementById('clear-btn').classList.add('show');
        startCountdown(data.secondsLeft);
      }
    } catch (_) {}
  }
  checkExisting();
</script>
</body>
</html>
